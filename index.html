<h2 class="sr-only">Calculadora interactiva de sistemas de colas markovianos con cinco modelos: M/M/1, M/M/1/N, M/M/M, M/M/M/N y población finita.</h2>

<style>
  .tc-container { padding: 1rem 0; font-family: var(--font-sans); color: var(--color-text-primary); }
  .tc-tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1.25rem; border-bottom: 0.5px solid var(--color-border-tertiary); padding-bottom: 8px; }
  .tc-tab { padding: 8px 14px; font-size: 13px; border: 0.5px solid var(--color-border-tertiary); background: transparent; border-radius: var(--border-radius-md); cursor: pointer; color: var(--color-text-secondary); transition: all 0.15s; }
  .tc-tab:hover { background: var(--color-background-secondary); }
  .tc-tab.active { background: var(--color-background-info); color: var(--color-text-info); border-color: var(--color-border-info); font-weight: 500; }
  .tc-grid { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); gap: 1.25rem; }
  .tc-panel { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; }
  .tc-panel h3 { margin: 0 0 12px; font-size: 14px; font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
  .tc-field { margin-bottom: 14px; }
  .tc-field label { display: block; font-size: 13px; color: var(--color-text-secondary); margin-bottom: 6px; }
  .tc-field label .desc { font-size: 11px; color: var(--color-text-tertiary); display: block; margin-top: 2px; }
  .tc-field input { width: 100%; }
  .tc-results { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-top: 4px; }
  .tc-metric { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px 14px; }
  .tc-metric .label { font-size: 11px; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 4px; }
  .tc-metric .value { font-size: 20px; font-weight: 500; color: var(--color-text-primary); }
  .tc-metric .unit { font-size: 11px; color: var(--color-text-tertiary); margin-left: 4px; }
  .tc-formula { font-family: var(--font-mono); font-size: 12px; background: var(--color-background-secondary); padding: 8px 10px; border-radius: var(--border-radius-md); margin-top: 10px; color: var(--color-text-secondary); }
  .tc-warning { background: var(--color-background-warning); color: var(--color-text-warning); padding: 10px 12px; border-radius: var(--border-radius-md); font-size: 12px; margin-bottom: 12px; }
  .tc-info-box { background: var(--color-background-info); color: var(--color-text-info); padding: 10px 12px; border-radius: var(--border-radius-md); font-size: 12px; margin-bottom: 12px; }
  .tc-chart-wrap { position: relative; width: 100%; height: 260px; margin-top: 12px; }
  .tc-diagram { width: 100%; margin: 12px 0 4px; }
  .tc-notation { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 12px; padding: 8px 10px; background: var(--color-background-secondary); border-radius: var(--border-radius-md); font-family: var(--font-mono); }
  .tc-ask { margin-top: 14px; display: flex; flex-wrap: wrap; gap: 8px; }
  .tc-ask button { font-size: 12px; padding: 6px 10px; }
  @media (max-width: 600px) { .tc-grid { grid-template-columns: 1fr; } }
</style>

<div class="tc-container">
  <div class="tc-tabs" id="tc-tabs">
    <button class="tc-tab active" data-model="mm1">M/M/1</button>
    <button class="tc-tab" data-model="mm1n">M/M/1/N</button>
    <button class="tc-tab" data-model="mmm">M/M/M</button>
    <button class="tc-tab" data-model="mmmn">M/M/M/N</button>
    <button class="tc-tab" data-model="finita">Población finita</button>
    <button class="tc-tab" data-model="serie">P/P/1/2-P/P/1/1</button>
  </div>

  <div class="tc-notation" id="tc-notation">M/M/1 — Un canal, capacidad infinita, población infinita, sin impaciencia, FIFO</div>
  <div class="tc-diagram" id="tc-diagram"></div>

  <div class="tc-grid">
    <div class="tc-panel">
      <h3>Parámetros</h3>
      <div id="tc-warning-zone"></div>
      <div id="tc-inputs"></div>
      <div class="tc-formula" id="tc-formula"></div>
      <div class="tc-ask">
        <button onclick="askExample()">Ver ejemplo aplicado ↗</button>
        <button onclick="askTheory()">Explicar la teoría ↗</button>
      </div>
    </div>

    <div class="tc-panel">
      <h3>Resultados</h3>
      <div class="tc-results" id="tc-results"></div>
      <div class="tc-chart-wrap">
        <canvas id="tc-chart" role="img" aria-label="Distribución de probabilidades de estado del sistema"></canvas>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
(function(){
  let currentModel = 'mm1';
  let chart = null;

  const modelDefs = {
    mm1: {
      title: 'M/M/1 — Un canal, capacidad infinita, población infinita, sin impaciencia, FIFO',
      inputs: [
        { id:'lambda', label:'λ — Tasa de arribos', desc:'Clientes que llegan por unidad de tiempo', value:8, step:0.1, min:0 },
        { id:'mu', label:'μ — Velocidad de atención', desc:'Clientes que puede atender el canal por unidad de tiempo', value:10, step:0.1, min:0.1 }
      ],
      formula: 'p(n) = ρⁿ·(1−ρ)   L = λ/(μ−λ)   W = 1/(μ−λ)'
    },
    mm1n: {
      title: 'M/M/1/N — Un canal, capacidad finita N, sin impaciencia',
      inputs: [
        { id:'lambda', label:'λ — Tasa de arribos', desc:'Clientes por unidad de tiempo', value:12, step:0.1, min:0 },
        { id:'mu', label:'μ — Velocidad de atención', desc:'Clientes por unidad de tiempo', value:10, step:0.1, min:0.1 },
        { id:'N', label:'N — Capacidad del sistema', desc:'Número máximo de clientes (canal + cola)', value:5, step:1, min:1 }
      ],
      formula: 'p(n) = ρⁿ·(1−ρ)/(1−ρ^(N+1))   λ̄ = λ·(1−p(N))'
    },
    mmm: {
      title: 'M/M/M — M canales en paralelo, capacidad infinita',
      inputs: [
        { id:'lambda', label:'λ — Tasa de arribos', desc:'Clientes por unidad de tiempo', value:12, step:0.1, min:0 },
        { id:'mu', label:'μ — Velocidad de cada canal', desc:'Clientes por unidad de tiempo (cada canal)', value:6, step:0.1, min:0.1 },
        { id:'M', label:'M — Número de canales', desc:'Canales en paralelo', value:4, step:1, min:1 }
      ],
      formula: 'Condición de equilibrio: ρ < M.   p(esperar) = ρᴹ·p(0)/[(M−1)!·(M−ρ)]'
    },
    mmmn: {
      title: 'M/M/M/N — M canales en paralelo, capacidad finita N',
      inputs: [
        { id:'lambda', label:'λ — Tasa de arribos', desc:'Clientes por unidad de tiempo', value:10, step:0.1, min:0 },
        { id:'mu', label:'μ — Velocidad de cada canal', desc:'Clientes por unidad de tiempo', value:6, step:0.1, min:0.1 },
        { id:'M', label:'M — Número de canales', desc:'Canales en paralelo', value:2, step:1, min:1 },
        { id:'N', label:'N — Capacidad del sistema', desc:'Máximo de clientes en sistema (N ≥ M)', value:4, step:1, min:1 }
      ],
      formula: 'p(N) → rechazos.   R̄ = λ·p(N)   λ̄ = λ·(1−p(N))'
    },
    finita: {
      title: 'M/M/1/(N′) — Población finita N′, un canal',
      inputs: [
        { id:'Np', label:"N' — Tamaño de la población", desc:'Total de clientes potenciales', value:5, step:1, min:1 },
        { id:'lambdar', label:'λr — Frecuencia de requerimiento', desc:'Veces que cada cliente requiere el servicio por unidad de tiempo', value:0.5, step:0.05, min:0.01 },
        { id:'mu', label:'μ — Velocidad de atención', desc:'Clientes por unidad de tiempo', value:3, step:0.1, min:0.1 }
      ],
      formula: 'λₙ = (N′−n)·λr   p(n) = [N′!/(N′−n)!]·ρrⁿ·p(0)'
    },
    serie: {
      title: 'P/P/1/2-P/P/1/1 — Dos centros en serie con bloqueo, cola sólo en el primero',
      inputs: [
        { id:'lambda', label:'λ — Tasa de arribos', desc:'Clientes por unidad de tiempo al sistema', value:4.5, step:0.1, min:0 },
        { id:'mu1', label:'μ₁ — Velocidad canal 1', desc:'Clientes por unidad de tiempo en primer centro', value:4, step:0.1, min:0.1 },
        { id:'mu2', label:'μ₂ — Velocidad canal 2', desc:'Clientes por unidad de tiempo en segundo centro', value:5, step:0.1, min:0.1 }
      ],
      formula: 'Estados: (nC,n₁,n₂). Canal 1 puede quedar bloqueado si canal 2 ocupado. Cap. cola=1 en C1.'
    }
  };

  function fmt(v, d=4){
    if (!isFinite(v) || isNaN(v)) return '∞';
    if (Math.abs(v) > 1e6) return v.toExponential(2);
    return Number(v.toFixed(d)).toString();
  }

  function metric(label, value, unit=''){
    return `<div class="tc-metric"><div class="label">${label}</div><div class="value">${value}${unit ? `<span class="unit">${unit}</span>` : ''}</div></div>`;
  }

  function renderInputs(){
    const def = modelDefs[currentModel];
    document.getElementById('tc-notation').textContent = def.title;
    document.getElementById('tc-formula').textContent = def.formula;
    document.getElementById('tc-diagram').innerHTML = renderDiagram(currentModel);
    const html = def.inputs.map(inp => `
      <div class="tc-field">
        <label for="inp-${inp.id}">${inp.label}<span class="desc">${inp.desc}</span></label>
        <input type="number" id="inp-${inp.id}" value="${inp.value}" step="${inp.step}" min="${inp.min}" />
      </div>
    `).join('');
    document.getElementById('tc-inputs').innerHTML = html;
    def.inputs.forEach(inp => {
      document.getElementById('inp-'+inp.id).addEventListener('input', compute);
    });
  }

        <defs><marker id="arr4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="currentColor"/></marker></defs>
        <text x="20" y="95" style="${txt}">λ</text>
        <line x1="40" y1="100" x2="100" y2="100" stroke="${stroke}" stroke-width="1"/>
        <text x="108" y="95" style="${txt}">λ̄</text>
        <line x1="125" y1="100" x2="160" y2="100" stroke="${stroke}" stroke-width="1" marker-end="url(#arr4)"/>

  function getVal(id){ return parseFloat(document.getElementById('inp-'+id).value) || 0; }

  // ---------- M/M/1 ----------
  function calcMM1(){
    const lambda = getVal('lambda'), mu = getVal('mu');
    const rho = lambda/mu;
    const warnZone = document.getElementById('tc-warning-zone');
    if (rho >= 1){
      warnZone.innerHTML = `<div class="tc-warning">⚠ ρ = ${fmt(rho,3)} ≥ 1. El sistema no alcanza equilibrio (la cola crece indefinidamente). Debe cumplirse λ &lt; μ.</div>`;
      document.getElementById('tc-results').innerHTML =
        metric('ρ — Factor de tránsito', fmt(rho,3)) +
        metric('Estado', 'Inestable');
      drawChart([], []);
      return;
    }
    warnZone.innerHTML = '';
    const p0 = 1 - rho;
    const L = lambda/(mu - lambda);
    const Lc = (lambda*lambda)/(mu*(mu - lambda));
    const W = 1/(mu - lambda);
    const Wc = lambda/(mu*(mu - lambda));
    const H = rho;
    document.getElementById('tc-results').innerHTML =
      metric('ρ — Factor de tránsito', fmt(rho,4)) +
      metric('p(0) — Sistema vacío', fmt(p0,4)) +
      metric('L — Clientes en sistema', fmt(L,3)) +
      metric('Lc — Clientes en cola', fmt(Lc,3)) +
      metric('W — Tiempo en sistema', fmt(W,4)) +
      metric('Wc — Tiempo en cola', fmt(Wc,4)) +
      metric('H — Ocupación canal', fmt(H,4));
    const ns = []; const ps = [];
    for (let n=0; n<=15; n++){ ns.push(n); ps.push(Math.pow(rho,n)*(1-rho)); }
    drawChart(ns, ps);
  }

  // ---------- M/M/1/N ----------
  function calcMM1N(){
    const lambda = getVal('lambda'), mu = getVal('mu'), N = Math.round(getVal('N'));
    const rho = lambda/mu;
    document.getElementById('tc-warning-zone').innerHTML = N < 1
      ? `<div class="tc-warning">N debe ser ≥ 1</div>` : '';
    if (N < 1){ return; }
    let p0;
    if (Math.abs(rho - 1) < 1e-9) p0 = 1/(N+1);
    else p0 = (1 - rho)/(1 - Math.pow(rho, N+1));
    const ps = [];
    for (let n=0; n<=N; n++) ps.push(Math.pow(rho,n)*p0);
    let L = 0; for (let n=0; n<=N; n++) L += n*ps[n];
    const pN = ps[N];
    const lambdaEff = lambda*(1 - pN);
    const muEff = mu*(1 - p0);
    const Lc = L - (1 - p0);
    const Wc = Lc/lambdaEff;
    const W = Wc + 1/mu;
    const Rb = lambda*pN;
    const PR = Rb/lambda;
    document.getElementById('tc-results').innerHTML =
      metric('ρ', fmt(rho,4)) +
      metric('p(0)', fmt(p0,4)) +
      metric('p(N) — Rechazo', fmt(pN,4)) +
      metric('L', fmt(L,3)) +
      metric('Lc', fmt(Lc,3)) +
      metric('W', fmt(W,4)) +
      metric('Wc', fmt(Wc,4)) +
      metric('λ̄ — Tasa efectiva', fmt(lambdaEff,3)) +
      metric('R̄ — Tasa rechazo', fmt(Rb,3)) +
      metric('PR — % rechazo', fmt(PR*100,2), '%');
    const ns = []; for (let n=0;n<=N;n++) ns.push(n);
    drawChart(ns, ps);
  }

  // ---------- M/M/M ----------
  function fact(n){ let r=1; for (let i=2;i<=n;i++) r*=i; return r; }

  function calcMMM(){
    const lambda = getVal('lambda'), mu = getVal('mu'), M = Math.round(getVal('M'));
    const rho = lambda/mu;
    const warnZone = document.getElementById('tc-warning-zone');
    if (rho >= M){
      warnZone.innerHTML = `<div class="tc-warning">⚠ ρ = ${fmt(rho,3)} ≥ M = ${M}. Sistema inestable: la cola crece indefinidamente. Debe cumplirse λ &lt; M·μ.</div>`;
      document.getElementById('tc-results').innerHTML =
        metric('ρ', fmt(rho,3)) +
        metric('ρ/M', fmt(rho/M,3)) +
        metric('Estado', 'Inestable');
      drawChart([], []);
      return;
    }
    warnZone.innerHTML = '';
    let sum = 0;
    for (let n=0; n<M; n++) sum += Math.pow(rho,n)/fact(n);
    sum += Math.pow(rho,M)/(fact(M-1)*(M - rho));
    const p0 = 1/sum;
    const pEsperar = Math.pow(rho,M)*p0/(fact(M-1)*(M - rho));
    const Lc = pEsperar * rho/(M - rho);
    const L = Lc + rho;
    const Wc = Lc/lambda;
    const W = Wc + 1/mu;
    const H = rho;
    const ocup = rho/M;
    document.getElementById('tc-results').innerHTML =
      metric('ρ', fmt(rho,4)) +
      metric('ρ/M — Utilización', fmt(ocup,4)) +
      metric('p(0)', fmt(p0,4)) +
      metric('p(esperar)', fmt(pEsperar,4)) +
      metric('L', fmt(L,3)) +
      metric('Lc', fmt(Lc,3)) +
      metric('W', fmt(W,4)) +
      metric('Wc', fmt(Wc,4)) +
      metric('H — Canales activos', fmt(H,3));
    const ns = []; const ps = [];
    for (let n=0; n<=20; n++){
      let pn;
      if (n < M) pn = Math.pow(rho,n)/fact(n)*p0;
      else pn = Math.pow(rho,n)/(fact(M)*Math.pow(M,n-M))*p0;
      ns.push(n); ps.push(pn);
    }
    drawChart(ns, ps);
  }

  // ---------- M/M/M/N ----------
  function calcMMMN(){
    const lambda = getVal('lambda'), mu = getVal('mu'), M = Math.round(getVal('M')), N = Math.round(getVal('N'));
    const warnZone = document.getElementById('tc-warning-zone');
    if (N < M){
      warnZone.innerHTML = `<div class="tc-warning">N debe ser ≥ M (capacidad al menos igual a número de canales)</div>`;
      return;
    }
    warnZone.innerHTML = '';
    const rho = lambda/mu;
    let sum = 0;
    for (let n=0; n<M; n++) sum += Math.pow(rho,n)/fact(n);
    for (let n=M; n<=N; n++) sum += Math.pow(rho,n)/(fact(M)*Math.pow(M,n-M));
    const p0 = 1/sum;
    const ps = [];
    for (let n=0; n<=N; n++){
      if (n < M) ps.push(Math.pow(rho,n)/fact(n)*p0);
      else ps.push(Math.pow(rho,n)/(fact(M)*Math.pow(M,n-M))*p0);
    }
    let L = 0; for (let n=0;n<=N;n++) L += n*ps[n];
    let Lc = 0; for (let n=M;n<=N;n++) Lc += (n-M)*ps[n];
    const pN = ps[N];
    const lambdaEff = lambda*(1 - pN);
    let H = 0;
    for (let n=0;n<M;n++) H += n*ps[n];
    for (let n=M;n<=N;n++) H += M*ps[n];
    const Wc = Lc/lambdaEff;
    const W = Wc + 1/mu;
    const Rb = lambda*pN;
    const PR = Rb/lambda;
    document.getElementById('tc-results').innerHTML =
      metric('ρ', fmt(rho,4)) +
      metric('p(0)', fmt(p0,4)) +
      metric('p(N) — Rechazo', fmt(pN,4)) +
      metric('L', fmt(L,3)) +
      metric('Lc', fmt(Lc,3)) +
      metric('W', fmt(W,4)) +
      metric('Wc', fmt(Wc,4)) +
      metric('H — Canales activos', fmt(H,3)) +
      metric('λ̄', fmt(lambdaEff,3)) +
      metric('R̄ — Rechazos', fmt(Rb,3)) +
      metric('PR — % rechazo', fmt(PR*100,2), '%');
    const ns = []; for (let n=0;n<=N;n++) ns.push(n);
    drawChart(ns, ps);
  }

  // ---------- Población finita M/M/1/(N') ----------
  function calcFinita(){
    const Np = Math.round(getVal('Np')), lambdar = getVal('lambdar'), mu = getVal('mu');
    const warnZone = document.getElementById('tc-warning-zone');
    if (Np < 1){ warnZone.innerHTML = `<div class="tc-warning">N′ debe ser ≥ 1</div>`; return; }
    warnZone.innerHTML = '';
    const rhor = lambdar/mu;
    // p(n) = [N'!/(N'-n)!] * rhor^n * p(0)
    const coefs = [];
    let sum = 0;
    for (let n=0; n<=Np; n++){
      let c = 1;
      for (let i=0; i<n; i++) c *= (Np - i);
      c *= Math.pow(rhor, n);
      coefs.push(c);
      sum += c;
    }
    const p0 = 1/sum;
    const ps = coefs.map(c => c*p0);
    let L = 0; for (let n=0;n<=Np;n++) L += n*ps[n];
    const H = 1 - p0;
    const Lc = L - H;
    const J = Np - L;  // fuera del sistema
    const lambdaEff = J*lambdar;
    const Wc = Lc/lambdaEff;
    const W = Wc + 1/mu;
    document.getElementById('tc-results').innerHTML =
      metric('ρr — λr/μ', fmt(rhor,4)) +
      metric('p(0)', fmt(p0,4)) +
      metric('L — En sistema', fmt(L,3)) +
      metric('Lc — En cola', fmt(Lc,3)) +
      metric('J — Fuera sistema', fmt(J,3)) +
      metric('H — Ocupación', fmt(H,4)) +
      metric('λ̄', fmt(lambdaEff,3)) +
      metric('Wc', fmt(Wc,4)) +
      metric('W', fmt(W,4));
    const ns = []; for (let n=0;n<=Np;n++) ns.push(n);
    drawChart(ns, ps);
  }

  // ---------- P/P/1/2-P/P/1/1 (dos centros en serie con bloqueo, cola en C1) ----------
  // Estados (nC, n1, n2):
  //   s0=(0,0,0), s1=(0,1,0), s2=(0,0,1), s3=(0,1,1), s4=(0,b,1),
  //   s5=(1,1,1), s6=(1,1,0), s7=(1,b,1)
  function calcSerie(){
    const lam = getVal('lambda'), m1 = getVal('mu1'), m2 = getVal('mu2');
    document.getElementById('tc-warning-zone').innerHTML = '';
    // Sistema de 8 ecuaciones (7 de estado + suma=1).
    // Resolver via Gauss-Jordan. A·x = b.  x = [p000,p010,p001,p011,pb1,p111,p110,pb11]
    // Balanceo de flujos (sale = entra):
    // s0: lam = p010*m1 + p001*m2 ?  No: del libro p(0,0)·λ = p(1,0)·μ1 + p(0,1)·μ2 (caso 2 canales serie sin cola, eq[1])
    // Para P/P/1/2-P/P/1/1 (cola=1 en C1), de capítulo 6.2:
    // (0,0,0): salida lam.   entradas: p(0,0,1)*m2  (y p(0,1,0)*m1 va a (0,0,0)? NO: cuando termina C1 con C2 libre el cliente PASA a C2)
    // Mejor implementar como cadena de Markov balanceando cada nodo:
    // Transiciones desde (0,0,0): arribo -> (0,1,0)
    // (0,1,0): arribo -> (1,1,0).  fin C1 (m1) -> (0,0,1) [pasa a C2]
    // (0,0,1): arribo -> (0,1,1). fin C2 (m2) -> (0,0,0)
    // (0,1,1): arribo -> (1,1,1). fin C1 (m1) -> (0,b,1). fin C2 (m2) -> (0,1,0) [el de C1 pasa a C2]
    // (0,b,1): arribo -> (1,b,1). fin C2 (m2) -> (0,0,1) [el bloqueado pasa a C2]
    // (1,1,0): fin C1 (m1) -> (0,1,1) [pasa a C2 y el de cola entra a C1]
    // (1,1,1): fin C1 (m1) -> (1,b,1). fin C2 (m2) -> (1,1,0) [pasa C1 a C2... NO: pasa C2 que se libera, C1 sigue, cola sigue]
    //          fin C2: (1,1,1) -> (1,1,0)? No: queda (0,1,1) porque el de cola entra a C1 cuando C1 termine, no ahora.
    //          Correctamente: fin C2 en (1,1,1) -> (1,1,0)? El cliente de C2 sale. C1 sigue ocupado. Cola sigue con 1. Estado: (1,1,0). OK.
    // (1,b,1): fin C2 (m2) -> (1,0,1)? No existe ese estado. Cuando termina C2 en (1,b,1): el de C2 sale, el bloqueado pasa a C2, y el de cola entra a C1. Queda (0,1,1).
    //
    // Construyo matriz 8x8 con ecuaciones de balance + colectividad exhaustiva.
    const idx = {s000:0, s010:1, s001:2, s011:3, sb1:4, s111:5, s110:6, sb11:7};
    const n = 8;
    const A = Array.from({length:n},()=>Array(n).fill(0));
    const b = Array(n).fill(0);
    
    // Balance nodo s000: sale lam ; entra desde s001 (m2)
    // lam*p000 = m2*p001
    A[0][idx.s000] = lam; A[0][idx.s001] = -m2;
    // s010: sale (lam + m1) ; entra: arribo desde s000 (lam), fin C2 desde s011 (m2)
    A[1][idx.s010] = lam + m1; A[1][idx.s000] = -lam; A[1][idx.s011] = -m2;
    // s001: sale (lam + m2) ; entra: fin C1 desde s010 (m1), fin C2 desde sb1 (m2)
    A[2][idx.s001] = lam + m2; A[2][idx.s010] = -m1; A[2][idx.sb1] = -m2;
    // s011: sale (lam + m1 + m2) ; entra: arribo desde s001 (lam), fin C1 desde s110 (m1)
    A[3][idx.s011] = lam + m1 + m2; A[3][idx.s001] = -lam; A[3][idx.s110] = -m1;
    // sb1 = (0,b,1): sale (lam + m2) ; entra: fin C1 desde s011 (m1)
    A[4][idx.sb1] = lam + m2; A[4][idx.s011] = -m1;
    // s111: sale (m1 + m2) ; entra: arribo desde s011 (lam)
    A[5][idx.s111] = m1 + m2; A[5][idx.s011] = -lam;
    // s110: sale m1 ; entra: arribo desde s010 (lam), fin C2 desde s111 (m2)
    A[6][idx.s110] = m1; A[6][idx.s010] = -lam; A[6][idx.s111] = -m2;
    // sb11 = (1,b,1): sale m2 ; entra: arribo desde sb1 (lam), fin C1 desde s111 (m1)
    // PERO esta ecuación es linealmente dependiente. La reemplazamos por suma=1
    A[7] = Array(n).fill(1); b[7] = 1;
    
    // Resolver Gauss-Jordan
    const sol = solveLinear(A, b);
    if (!sol){
      document.getElementById('tc-warning-zone').innerHTML = `<div class="tc-warning">No se pudo resolver el sistema. Verificá los parámetros.</div>`;
      return;
    }
    const [p000,p010,p001,p011,pb1,p111,p110,pb11] = sol;
    
    // Verificar no-negatividad
    if (sol.some(v => v < -1e-6)){
      document.getElementById('tc-warning-zone').innerHTML = `<div class="tc-warning">⚠ Sistema posiblemente inestable. Probabilidades fuera de [0,1].</div>`;
    }
    
    // Variables características
    // Longitudes
    const L = 1*(p001+p010) + 2*(p011+pb1+p110) + 3*(p111+pb11);
    const Lc = 1*(p110+p111+pb11);  // clientes en cola
    const L1 = p010 + p011 + pb1 + p110 + p111 + pb11;
    const L2 = p001 + p011 + pb1 + p111 + pb11;
    const H1 = p010 + p011 + p110 + p111;  // canal 1 activamente trabajando
    const H2 = p001 + p011 + p111 + pb1 + pb11;  // canal 2 trabajando
    const B = pb1 + pb11;  // canal 1 bloqueado
    
    // Probabilidad de ingreso/rechazo
    // Cliente arriba y se retira si el sistema está completo (nC=1 ⇒ estados con primer índice 1)
    const pRechazo = p110 + p111 + pb11;
    const pIngreso = p000 + p001 + p010 + p011 + pb1;
    const lambdaEff = lam * pIngreso;
    const Rb = lam * pRechazo;
    
    // Tiempos
    const W = L / lambdaEff;
    const Wc = Lc / lambdaEff;
    const Wb = B / lambdaEff;
    
    document.getElementById('tc-results').innerHTML =
      metric('p(0,0,0)', fmt(p000,4)) +
      metric('p(rechazo)', fmt(pRechazo,4)) +
      metric('L — Total', fmt(L,3)) +
      metric('Lc — Cola', fmt(Lc,3)) +
      metric('L₁ — Centro 1', fmt(L1,3)) +
      metric('L₂ — Centro 2', fmt(L2,3)) +
      metric('H₁ — Util. C1', fmt(H1,4)) +
      metric('H₂ — Util. C2', fmt(H2,4)) +
      metric('B — Bloqueo', fmt(B,4)) +
      metric('λ̄ — Ingreso', fmt(lambdaEff,3)) +
      metric('R̄ — Rechazo', fmt(Rb,3)) +
      metric('W — Permanencia', fmt(W,4)) +
      metric('Wc — Espera cola', fmt(Wc,4)) +
      metric('Wb — Bloqueo', fmt(Wb,4));
    
    // Gráfico: barras por estado
    const labels = ['(0,0,0)','(0,1,0)','(0,0,1)','(0,1,1)','(0,b,1)','(1,1,1)','(1,1,0)','(1,b,1)'];
    drawChartStates(labels, sol);
  }
  
  function solveLinear(A, b){
    const n = A.length;
    // Copia para no mutar
    const M = A.map((row,i) => [...row, b[i]]);
    for (let i=0; i<n; i++){
      // Pivoteo parcial
      let max = Math.abs(M[i][i]); let maxRow = i;
      for (let k=i+1; k<n; k++){
        if (Math.abs(M[k][i]) > max){ max = Math.abs(M[k][i]); maxRow = k; }
      }
      if (max < 1e-12) return null;
      [M[i], M[maxRow]] = [M[maxRow], M[i]];
      for (let k=i+1; k<n; k++){
        const c = M[k][i]/M[i][i];
        for (let j=i; j<=n; j++) M[k][j] -= c*M[i][j];
      }
    }
    const x = Array(n).fill(0);
    for (let i=n-1; i>=0; i--){
      let s = M[i][n];
      for (let j=i+1; j<n; j++) s -= M[i][j]*x[j];
      x[i] = s / M[i][i];
    }
    return x;
  }
  
  function drawChartStates(labels, data){
    const ctx = document.getElementById('tc-chart');
    if (!ctx) return;
    const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
    const barColor = isDark ? '#85B7EB' : '#378ADD';
    const gridColor = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.06)';
    const textColor = isDark ? '#B4B2A9' : '#5F5E5A';
    if (chart) chart.destroy();
    chart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [{
          label: 'p(estado)',
          data: data,
          backgroundColor: barColor,
          borderRadius: 3
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          title: { display: true, text: 'Probabilidades por estado (nC, n₁, n₂)', color: textColor, font: { size: 12, weight: 'normal' } },
          tooltip: { callbacks: { label: (ctx) => 'p' + ctx.label + ' = ' + ctx.parsed.y.toFixed(4) } }
        },
        scales: {
          x: { title: { display: true, text: 'Estado (nC, n₁, n₂)', color: textColor, font:{size:11} }, ticks:{color:textColor, font:{size:10}}, grid:{color:gridColor} },
          y: { title: { display: true, text: 'Probabilidad', color: textColor, font:{size:11} }, ticks:{color:textColor}, grid:{color:gridColor}, beginAtZero:true }
        }
      }
    });
  }

  function drawChart(labels, data){
    const ctx = document.getElementById('tc-chart');
    if (!ctx) return;
    const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
    const barColor = isDark ? '#85B7EB' : '#378ADD';
    const gridColor = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.06)';
    const textColor = isDark ? '#B4B2A9' : '#5F5E5A';
    if (chart) chart.destroy();
    chart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [{
          label: 'p(n)',
          data: data,
          backgroundColor: barColor,
          borderRadius: 3
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          title: { display: true, text: 'Distribución de probabilidades de estado p(n)', color: textColor, font: { size: 12, weight: 'normal' } },
          tooltip: { callbacks: { label: (ctx) => 'p(' + ctx.label + ') = ' + ctx.parsed.y.toFixed(4) } }
        },
        scales: {
          x: { title: { display: true, text: 'n (clientes en el sistema)', color: textColor, font:{size:11} }, ticks:{color:textColor}, grid:{color:gridColor} },
          y: { title: { display: true, text: 'Probabilidad', color: textColor, font:{size:11} }, ticks:{color:textColor}, grid:{color:gridColor}, beginAtZero:true }
        }
      }
    });
  }

  function compute(){
    if (currentModel === 'mm1') calcMM1();
    else if (currentModel === 'mm1n') calcMM1N();
    else if (currentModel === 'mmm') calcMMM();
    else if (currentModel === 'mmmn') calcMMMN();
    else if (currentModel === 'finita') calcFinita();
    else if (currentModel === 'serie') calcSerie();
  }

  document.getElementById('tc-tabs').addEventListener('click', (e) => {
    const btn = e.target.closest('.tc-tab');
    if (!btn) return;
    document.querySelectorAll('.tc-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    currentModel = btn.dataset.model;
    renderInputs();
    compute();
  });

  window.askExample = function(){
    const titles = { mm1:'M/M/1', mm1n:'M/M/1/N', mmm:'M/M/M', mmmn:'M/M/M/N', finita:'población finita M/M/1/(N′)' };
    sendPrompt('Dame un ejemplo aplicado y resuelto paso a paso del modelo de colas ' + titles[currentModel]);
  };
  window.askTheory = function(){
    const titles = { mm1:'M/M/1', mm1n:'M/M/1/N', mmm:'M/M/M', mmmn:'M/M/M/N', finita:'población finita M/M/1/(N′)' };
    sendPrompt('Explicame la teoría detrás del modelo ' + titles[currentModel] + ': cadena markoviana, ecuación de estado de régimen permanente y deducción de las fórmulas');
  };

  renderInputs();
  compute();
})();
</script>
